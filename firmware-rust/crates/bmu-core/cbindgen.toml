language = "C"
header = "/* Auto-generated by cbindgen — do not edit. Regenerate via `cargo xtask vendor-header`. */"
include_guard = "BMU_CORE_H"
no_includes = true
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
cpp_compat = true
style = "tag"

[export]
prefix = ""
# Ne pas emettre les externs ESP-IDF que l'allocateur Rust consomme :
# ils sont deja declares dans `esp_heap_caps.h` cote C, et les re-declarer
# avec un type different (`uint8_t *` vs `void *`) creerait un conflit
# a la compilation de main.cpp.
exclude = ["heap_caps_malloc", "heap_caps_free"]

[enum]
prefix_with_name = false
rename_variants = "None"
