# Vhost public bmu.saillant.cc — supervision BMU (lecture seule)
#
# Sert la page statique (kxkm-api/web/) et reverse-proxy /api/ vers l'API
# FastAPI de la VM kxkm-bmu via Tailscale, en injectant la clé API côté
# serveur (jamais exposée au navigateur). Seules les requêtes GET passent.
#
# Prérequis :
#   1. VM kxkm-bmu joignable en Tailscale depuis cet hôte (tailscale up sur la VM).
#      Remplacer <VM_TS_ADDR> par l'IP Tailscale (100.x.y.z) ou le nom MagicDNS (kxkm-bmu).
#   2. Remplacer <BMU_API_KEY> par la clé de ~/kxkm-api/.env sur la VM.
#   3. DNS bmu.saillant.cc → cet hôte (Cloudflare). TLS géré par Cloudflare
#      (proxied) — sinon ajouter un bloc 443 + certbot.
#   4. Déposer le contenu de kxkm-api/web/ dans /var/www/bmu.saillant.cc/.

server {
    listen 80;
    listen [::]:80;
    server_name bmu.saillant.cc;

    root /var/www/bmu.saillant.cc;
    index index.html;

    access_log /var/log/nginx/bmu.access.log;
    error_log  /var/log/nginx/bmu.error.log;

    # Page statique
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API — lecture seule, clé injectée côté serveur
    location /api/ {
        limit_except GET { deny all; }

        proxy_pass http://<VM_TS_ADDR>:8400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer <BMU_API_KEY>";

        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;

        # petit cache pour lisser les rafraîchissements (5s)
        proxy_cache_valid 200 3s;
    }
}
