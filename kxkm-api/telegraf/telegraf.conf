# Telegraf: MQTT → InfluxDB bridge for KXKM BMU

[agent]
  interval = "10s"
  flush_interval = "10s"

# Subscribe to BMU MQTT topics
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["bmu/battery/#"]
  data_format = "json"
  topic_tag = "topic"
  json_string_fields = ["state"]

  # Tag with battery number extracted from topic
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bmu/battery/+"
    tags = "_/_/battery_id"

# Write to InfluxDB
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "kxkm-influx-token-2026"
  organization = "kxkm"
  bucket = "bmu"
