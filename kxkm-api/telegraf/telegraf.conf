# Telegraf: MQTT → InfluxDB bridge for KXKM BMU

[agent]
  interval = "10s"
  flush_interval = "10s"

# Subscribe to BMU MQTT topics — supports both old and new format
# Old: bmu/battery/N (single BMU)
# New: bmu/{device_name}/battery/N (multi-BMU)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["bmu/+/battery/#", "bmu/battery/#"]
  data_format = "json"
  topic_tag = "topic"
  json_string_fields = ["state"]

  # New format: bmu/{bmu_name}/battery/{battery_id}
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bmu/+/battery/+"
    tags = "_/bmu/_/battery_id"

  # Old format fallback: bmu/battery/{battery_id}
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bmu/battery/+"
    tags = "_/_/battery_id"

# Subscribe to BMU climate topic (température/humidité AHT30)
# New format: bmu/{device_name}/climate
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["bmu/+/climate"]
  data_format = "json"
  name_override = "climate"
  topic_tag = "topic"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bmu/+/climate"
    tags = "_/bmu/_"

# Write to InfluxDB
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "kxkm-influx-token-2026"
  organization = "kxkm"
  bucket = "bmu"
