# Telegraf: MQTT → InfluxDB bridge for KXKM BMU
#
# Le firmware publie en MQTT des payloads "courts" (volts/amps) ; ce pont
# les transforme vers le schéma canonique InfluxDB lu par l'API et Grafana :
#   mesure `battery`  : tag id ; champs voltage_mv, current_ma,
#                       ah_discharge_mah, ah_charge_mah (mV/mA/mAh, ×1000),
#                       soh_pct, r_ohmic_mohm, state, (+ r_tot, bal_duty)
#   mesure `climate`  : temperature_c, humidity_pct
#
# Conversions d'unités firmware → InfluxDB :
#   v (V)   → voltage_mv (mV)        ×1000
#   i (A)   → current_ma (mA)        ×1000
#   ah_d/c  → ah_*_mah  (mAh)        ×1000
#   r_ohm/soh : rename seul (déjà en mΩ / %)

[agent]
  interval = "10s"
  flush_interval = "10s"

# ── Batteries ─────────────────────────────────────────────────────
# Old: bmu/battery/N (single BMU)  |  New: bmu/{device_name}/battery/N
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["bmu/+/battery/#", "bmu/battery/#"]
  data_format = "json"
  name_override = "battery"
  topic_tag = "topic"
  json_string_fields = ["state"]
  fielddrop = ["bat"]  # index redondant (déjà extrait du topic en tag `id`)

  # New format: bmu/{bmu_name}/battery/{id}
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bmu/+/battery/+"
    tags = "_/bmu/_/id"

  # Old format fallback: bmu/battery/{id}
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bmu/battery/+"
    tags = "_/_/id"

# ── Climat (AHT30) : bmu/{device_name}/climate ────────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["bmu/+/climate"]
  data_format = "json"
  name_override = "climate"
  topic_tag = "topic"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bmu/+/climate"
    tags = "_/bmu/_"

# ── Solaire (VE.Direct) : bmu/{device_name}/solar ─────────────────
# Champs déjà au bon nom (vpv, ppv, vbat, ibat, cs, yield, err) → pas de
# transformation, juste mesure `solar` + tag device.
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  topics = ["bmu/+/solar"]
  data_format = "json"
  name_override = "solar"
  topic_tag = "topic"
  json_string_fields = ["cs"]

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bmu/+/solar"
    tags = "_/device/_"

# ── Transformations (mesure `battery`) ────────────────────────────
# 1) renommage des champs courts vers le schéma canonique
[[processors.rename]]
  order = 1
  namepass = ["battery"]
  [[processors.rename.replace]]
    field = "v"
    dest = "voltage_mv"
  [[processors.rename.replace]]
    field = "i"
    dest = "current_ma"
  [[processors.rename.replace]]
    field = "ah_d"
    dest = "ah_discharge_mah"
  [[processors.rename.replace]]
    field = "ah_c"
    dest = "ah_charge_mah"
  [[processors.rename.replace]]
    field = "r_ohm"
    dest = "r_ohmic_mohm"
  [[processors.rename.replace]]
    field = "soh"
    dest = "soh_pct"

# 2) conversion d'unités ×1000 (V→mV, A→mA, Ah→mAh)
[[processors.scale]]
  order = 2
  namepass = ["battery"]
  [[processors.scale.scaling]]
    factor = 1000.0
    offset = 0.0
    fields = ["voltage_mv", "current_ma", "ah_discharge_mah", "ah_charge_mah"]

# ── Transformations (mesure `climate`) ────────────────────────────
[[processors.rename]]
  order = 3
  namepass = ["climate"]
  [[processors.rename.replace]]
    field = "temp_c"
    dest = "temperature_c"
  [[processors.rename.replace]]
    field = "humidity"
    dest = "humidity_pct"

# ── Sortie InfluxDB ───────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "kxkm-influx-token-2026"
  organization = "kxkm"
  bucket = "bmu"
