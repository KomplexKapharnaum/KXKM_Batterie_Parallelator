name: qa-cicd-environments

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - object-orriented

jobs:
  qa-by-environment:
    runs-on: ubuntu-latest
    name: qa-${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: sim-host
          - id: kxkm-s3-build
          - id: kxkm-v3-build
          - id: kxkm-s3-memory-budget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap DebugLogger Fallback
        run: |
          if [ ! -f lib/DebugLogger/DebugLogger.h ]; then
            rm -rf lib/DebugLogger
            mkdir -p lib/DebugLogger
            cat > lib/DebugLogger/DebugLogger.h <<'EOF'
            #pragma once

            #ifdef ARDUINO
            #include <Arduino.h>
            #else
            #include <string>
            using String = std::string;
            #endif

            class DebugLogger {
            public:
              enum DebugLevel {
                NONE,
                ERROR,
                WARNING,
                INFO,
                TIME,
                I2C,
                BATTERY,
                SD,
                SPIFF,
                WIFI,
                WEB,
                INFLUXDB
              };

              struct DebugLevelInfo {
                const char *name;
                int enabled;
              };

              void begin(const DebugLevelInfo *, int) {}
              void setDebugLevel(const DebugLevelInfo *, int) {}
              void print(DebugLevel, const String &) {}
              void print(DebugLevel, const char *) {}
              void println(DebugLevel, const String &) {}
              void println(DebugLevel, const char *) {}
            };
            EOF
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install Tooling
        run: scripts/ci/install_tooling.sh

      - name: Run QA for target environment
        run: scripts/ci/run_qa_env.sh ${{ matrix.id }}
